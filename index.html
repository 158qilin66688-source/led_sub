<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  
  <!-- PWA 主屏幕配置 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LED跑马灯">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="apple-touch-fullscreen" content="yes">
  
  <!-- 主屏幕图标 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'>
      <rect width='180' height='180' fill='%23000' rx='30'/>
      <text x='90' y='120' font-size='100' text-anchor='middle' fill='%23ffff00'>✨</text>
    </svg>">
  
  <title>LED跑马灯 · 应援灯牌</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'PingFang SC', 'HarmonyOS Sans', sans-serif;
      touch-action: manipulation;
      position: fixed;
      top: 0;
      left: 0;
      /* 主屏幕模式下使用安全区域 */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      width: 100vw;
      position: relative;
    }

    /* 主屏幕模式提示 */
    .standalone-tip {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 20px 30px;
      border-radius: 20px;
      text-align: center;
      z-index: 999;
      display: none;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .standalone-tip h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    .standalone-tip p {
      font-size: 14px;
      color: #aaa;
      margin: 5px 0;
    }
    
    .standalone-tip .close-btn {
      margin-top: 15px;
      background: #00e5ff;
      color: #000;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 控制面板 */
    .controls {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 100;
      border-bottom: 0.5px solid rgba(255,255,255,0.15);
      transition: all 0.3s ease;
      max-height: 45vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .controls.hidden {
      opacity: 0;
      transform: translateY(-100%);
      pointer-events: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      min-height: 38px;
    }

    input, button, select {
      padding: 6px 8px;
      border: none;
      border-radius: 18px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      outline: none;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      -webkit-appearance: none;
      appearance: none;
      transition: all 0.15s;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    button {
      cursor: pointer;
      background: rgba(255,255,255,0.18);
      font-weight: 600;
    }
    
    button:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.3);
    }

    input[type="text"] {
      flex: 2;
      min-width: 140px;
      font-size: 16px;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.35);
      padding: 0 12px;
      letter-spacing: 2px;
    }

    input[type="range"] {
      flex: 1;
      padding: 0;
      background: transparent;
      height: 24px;
      border: none;
    }

    input[type="color"] {
      width: 36px;
      height: 36px;
      padding: 2px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: transparent;
    }

    .btn-scroll-on { background: #ff2d78; border-color: #ff6b9d; }
    .btn-scroll-off { background: #4a4a5a; color: #bbb; }
    .btn-marquee-on { background: #00e5ff; color: #000; border-color: #00e5ff; }
    .btn-marquee-off { background: #3a3a4a; color: #ccc; }
    .btn-full { background: #30c75c; color: #fff; }
    .btn-share { background: #ff9500; color: #fff; }
    
    .style-btn {
      background: #2c2c3a;
      color: #ccc;
      border: 1px solid #555;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .style-btn.active {
      background: #00e5ff;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 15px #00e5ff;
    }
    
    .save-btn { background: #2e86de; color: #fff; }
    .del-btn { background: #e74c3c; color: #fff; }

    .emoji-btn {
      font-size: 20px;
      padding: 3px 7px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      min-height: 34px;
    }

    .color-pre {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .label { font-size: 11px; color: #aaa; min-width: 45px; }
    .val { font-size: 11px; color: #fff; min-width: 30px; text-align: center; }

    /* LED 显示区 */
    #led-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
      background: #000;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
    }

    .text-container {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-weight: 900;
      z-index: 2;
      padding: 8px 20px;
      text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
      letter-spacing: 3px;
      pointer-events: none;
      will-change: left;
      -webkit-font-smoothing: antialiased;
    }

    /* 跑马灯边框 */
    .marquee-base {
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border: 4px solid transparent;
      border-radius: 28px;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 1;
      pointer-events: none;
    }

    .marquee-rainbow {
      background: linear-gradient(90deg, #ff2400, #ffd800, #00e1ff, #9d00ff, #ff2400) border-box;
      background-size: 500% 100%;
      animation: flow 2.2s linear infinite;
    }
    .marquee-gold {
      background: linear-gradient(90deg, #fff700, #ffaa00, #fff700) border-box;
      background-size: 300% 100%;
      animation: flow 1.8s linear infinite;
    }
    .marquee-neon {
      background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff) border-box;
      background-size: 300% 100%;
      animation: pingpong 2s ease-in-out infinite;
    }
    .marquee-red {
      background: linear-gradient(90deg, #ff0000, #ff5500, #ff0000) border-box;
      background-size: 200% 100%;
      animation: breath 2s ease-in-out infinite;
    }
    .marquee-fast {
      background: linear-gradient(90deg, #ffffff, #88ffff, #ffffff) border-box;
      background-size: 400% 100%;
      animation: flow 0.9s linear infinite;
    }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      100% { background-position: 500% 50%; }
    }
    @keyframes pingpong {
      0% { background-position: 0% 50%; }
      50% { background-position: 300% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes breath {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* 全屏提示 */
    .fullscreen-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 200;
      display: none;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    /* 横屏时自动隐藏控制面板 */
    @media screen and (orientation: landscape) {
      .controls {
        opacity: 0;
        transform: translateY(-100%);
        pointer-events: none;
      }
      .controls.show {
        opacity: 0.95;
        transform: translateY(0);
        pointer-events: auto;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- LED 显示区 -->
  <div id="led-box"></div>
  
  <!-- 控制面板 -->
  <div class="controls" id="controlPanel">
    <div class="row">
      <select id="textPreset" style="flex:1;">
        <option value="">📋 历史文案</option>
      </select>
      <button class="save-btn" id="saveBtn">💾</button>
      <button class="del-btn" id="delBtn">🗑️</button>
      <button class="btn-share" id="shareBtn">🔗</button>
    </div>
    <div class="row">
      <select id="fontFamily" style="flex:1;">
        <option value="sans-serif">系统默认</option>
        <option value="'PingFang SC', sans-serif">苹方黑体</option>
        <option value="Georgia, serif">衬线字体</option>
      </select>
    </div>
    <div class="row" id="emojiWrap">
      <button class="emoji-btn">❤️</button>
      <button class="emoji-btn">✨</button>
      <button class="emoji-btn">🌟</button>
      <button class="emoji-btn">🔥</button>
      <button class="emoji-btn">⚡</button>
      <button class="emoji-btn">🎤</button>
      <button class="emoji-btn">🎵</button>
      <button class="emoji-btn">🎉</button>
    </div>
    <div class="row">
      <input type="text" id="input-text" value="LOVE 2026" placeholder="输入文字..." autocomplete="off">
    </div>
    <div class="row" id="colorWrap">
      <button class="color-pre" data-color="#ffff00" style="background:#ffff00;"></button>
      <button class="color-pre" data-color="#ff0000" style="background:#ff0000;"></button>
      <button class="color-pre" data-color="#00ff00" style="background:#00ff00;"></button>
      <button class="color-pre" data-color="#00ffff" style="background:#00ffff;"></button>
      <button class="color-pre" data-color="#ff00ff" style="background:#ff00ff;"></button>
      <input type="color" id="color-text" value="#ffff00">
      <input type="color" id="color-bg" value="#000000">
    </div>
    <div class="row">
      <span class="label">🔤 字号</span>
      <input type="range" id="range-size" min="30" max="300" value="85">
      <span class="val" id="size-val">85px</span>
    </div>
    <div class="row">
      <span class="label">⚡ 速度</span>
      <input type="range" id="range-speed" min="1" max="30" value="10">
      <span class="val" id="speed-val">10</span>
    </div>
    <div class="row" id="styleWrap">
      <button class="style-btn active" data-style="rainbow">🌈彩虹</button>
      <button class="style-btn" data-style="gold">✨金色</button>
      <button class="style-btn" data-style="neon">💜霓彩</button>
      <button class="style-btn" data-style="red">❤️炽红</button>
      <button class="style-btn" data-style="fast">⚡极速</button>
      <button id="btn-marquee" class="btn-marquee-off">💡边框</button>
      <button id="btn-scroll" class="btn-scroll-on">⏸️静止</button>
      <button class="btn-full" id="fullBtn">📱全屏</button>
    </div>
  </div>
  
  <!-- 提示信息 -->
  <div class="fullscreen-hint" id="fullscreenHint">👆 点击屏幕显示控制面板</div>
  
  <!-- 主屏幕模式提示 -->
  <div class="standalone-tip" id="standaloneTip">
    <h2>✨ 全屏模式已开启</h2>
    <p>旋转手机至横屏</p>
    <p>点击屏幕切换控制面板</p>
    <button class="close-btn" id="closeTipBtn">开始使用</button>
  </div>
</div>

<script>
(function(){
  let ani = null;
  let scrollOn = true;
  let lightOn = false;
  let style = 'rainbow';
  let pos = window.innerWidth;
  let font = 'sans-serif';
  let panelVisible = true;
  
  let history = [];
  try {
    history = JSON.parse(localStorage.getItem('led_text')) || [];
  } catch(e) {
    history = [];
  }
  
  const panel = document.getElementById('controlPanel');
  const box = document.getElementById('led-box');
  const preset = document.getElementById('textPreset');
  const fontSel = document.getElementById('fontFamily');
  const input = document.getElementById('input-text');
  const cText = document.getElementById('color-text');
  const cBg = document.getElementById('color-bg');
  const sizeS = document.getElementById('range-size');
  const speedS = document.getElementById('range-speed');
  const btnS = document.getElementById('btn-scroll');
  const btnM = document.getElementById('btn-marquee');
  const hint = document.getElementById('fullscreenHint');
  const standaloneTip = document.getElementById('standaloneTip');
  
  // 检测是否在主屏幕模式下运行
  function isStandalone() {
    return window.navigator.standalone || 
           window.matchMedia('(display-mode: standalone)').matches;
  }
  
  // 主屏幕模式欢迎提示
  if(isStandalone()) {
    setTimeout(() => {
      standaloneTip.style.display = 'block';
    }, 500);
    
    document.getElementById('closeTipBtn').onclick = function() {
      standaloneTip.style.display = 'none';
      // 横屏时自动隐藏面板
      if(window.innerWidth > window.innerHeight) {
        panel.classList.add('hidden');
        panelVisible = false;
      }
    };
    
    // 3秒后自动关闭提示
    setTimeout(() => {
      standaloneTip.style.display = 'none';
    }, 4000);
  }
  
  function updatePreset(){
    preset.innerHTML = '<option value="">📋 历史文案</option>';
    history.forEach((t,i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = t.length > 15 ? t.slice(0,13)+'…' : t;
      preset.appendChild(o);
    });
  }
  
  function stop(){ if(ani){ cancelAnimationFrame(ani); ani = null; } }
  
  function render(){
    stop();
    const txt = input.value.trim() || 'LED';
    const color = cText.value;
    const bg = cBg.value;
    const fsize = sizeS.value + 'px';
    const spd = parseInt(speedS.value);
    
    box.style.background = bg;
    box.innerHTML = '';
    
    const el = document.createElement('div');
    el.className = 'text-container';
    el.textContent = txt;
    el.style.color = color;
    el.style.fontSize = fsize;
    el.style.fontFamily = font;
    
    if(!scrollOn){
      el.style.left = '50%';
      el.style.transform = 'translate(-50%, -50%)';
      box.appendChild(el);
      if(lightOn){
        const f = document.createElement('div');
        f.className = 'marquee-base marquee-' + style;
        el.appendChild(f);
      }
      return;
    }
    
    el.style.left = pos + 'px';
    el.style.transform = 'translateY(-50%)';
    box.appendChild(el);
    
    if(lightOn){
      const f = document.createElement('div');
      f.className = 'marquee-base marquee-' + style;
      el.appendChild(f);
    }
    
    function anim(){
      if(!scrollOn){ stop(); return; }
      const l = parseFloat(el.style.left) || pos;
      const nl = l - (spd / 8);
      if(nl < -el.offsetWidth - 50) {
        el.style.left = window.innerWidth + 20 + 'px';
      } else {
        el.style.left = nl + 'px';
      }
      ani = requestAnimationFrame(anim);
    }
    ani = requestAnimationFrame(anim);
  }
  
  function togglePanel(){
    panelVisible = !panelVisible;
    if(panelVisible){
      panel.classList.remove('hidden');
      panel.classList.add('show');
      hint.style.display = 'none';
    } else {
      panel.classList.add('hidden');
      panel.classList.remove('show');
      hint.style.display = 'block';
      setTimeout(() => { hint.style.display = 'none'; }, 2000);
    }
  }
  
  // 点击LED区域切换面板
  box.onclick = function(e){
    if(e.target === box){
      togglePanel();
    }
  };
  
  panel.onclick = function(e){
    e.stopPropagation();
  };
  
  btnS.onclick = (e) => {
    e.stopPropagation();
    scrollOn = !scrollOn;
    btnS.textContent = scrollOn ? '⏸️静止' : '▶️滚动';
    btnS.className = scrollOn ? 'btn-scroll-on' : 'btn-scroll-off';
    if(!scrollOn) stop();
    render();
  };
  
  btnM.onclick = (e) => {
    e.stopPropagation();
    lightOn = !lightOn;
    btnM.textContent = lightOn ? '💡边框开' : '💡边框';
    btnM.className = lightOn ? 'btn-marquee-on' : 'btn-marquee-off';
    render();
  };
  
  preset.onchange = function(){
    if(this.value !== ''){
      input.value = history[parseInt(this.value)];
      render();
    }
  };
  
  fontSel.onchange = function(){
    font = this.value;
    render();
  };
  
  document.getElementById('saveBtn').onclick = (e) => {
    e.stopPropagation();
    const t = input.value.trim();
    if(t && !history.includes(t)){
      history.push(t);
      if(history.length > 20) history.shift();
      localStorage.setItem('led_text', JSON.stringify(history));
      updatePreset();
    }
  };
  
  document.getElementById('delBtn').onclick = (e) => {
    e.stopPropagation();
    if(preset.value !== ''){
      history.splice(parseInt(preset.value), 1);
      localStorage.setItem('led_text', JSON.stringify(history));
      updatePreset();
    }
  };
  
  document.querySelectorAll('#emojiWrap .emoji-btn').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      input.value += b.textContent;
      render();
    };
  });
  
  document.querySelectorAll('#colorWrap .color-pre').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      cText.value = b.dataset.color;
      render();
    };
  });
  
  document.querySelectorAll('#styleWrap .style-btn').forEach(b => {
    b.onclick = function(e){
      e.stopPropagation();
      style = this.dataset.style;
      document.querySelectorAll('.style-btn').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      if(lightOn) render();
    };
  });
  
  document.getElementById('shareBtn').onclick = (e) => {
    e.stopPropagation();
    const url = URL.createObjectURL(new Blob(['<!DOCTYPE html>\n' + document.documentElement.outerHTML], {type:'text/html'}));
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 300000);
  };
  
  document.getElementById('fullBtn').onclick = (e) => {
    e.stopPropagation();
    if(!isStandalone()){
      alert('📱 请点击分享按钮 → 添加到主屏幕\n\n即可获得真正全屏体验！');
    }
    panel.classList.add('hidden');
    panelVisible = false;
    hint.textContent = '📱 旋转手机至横屏获得最佳效果';
    hint.style.display = 'block';
    setTimeout(() => { hint.style.display = 'none'; }, 3000);
  };
  
  input.oninput = render;
  cText.oninput = render;
  cBg.oninput = render;
  
  sizeS.oninput = function(){
    document.getElementById('size-val').textContent = this.value + 'px';
    render();
  };
  
  speedS.oninput = function(){
    document.getElementById('speed-val').textContent = this.value;
    render();
  };
  
  window.addEventListener('orientationchange', function(){
    setTimeout(() => {
      pos = window.innerWidth;
      if(scrollOn) render();
      
      if(window.innerWidth > window.innerHeight && isStandalone()){
        panel.classList.add('hidden');
        panelVisible = false;
      }
    }, 300);
  });
  
  window.onresize = function(){
    pos = window.innerWidth;
    if(scrollOn) render();
  };
  
  // 初始化
  updatePreset();
  render();
  
  // Safari 模式提示添加到主屏幕
  if(!isStandalone() && /iPhone|iPad|iPod/.test(navigator.userAgent)){
    setTimeout(() => {
      hint.textContent = '💡 添加到主屏幕可隐藏地址栏';
      hint.style.display = 'block';
      setTimeout(() => { hint.style.display = 'none'; }, 4000);
    }, 1500);
  }
  
})();
</script>
</body>
</html>
