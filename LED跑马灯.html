<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  
  <!-- PWA 核心配置 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LED跑马灯">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="apple-touch-fullscreen" content="yes">
  
  <!-- 主屏幕图标 (内联SVG) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'>
      <rect width='180' height='180' fill='%23000' rx='30'/>
      <text x='90' y='110' font-size='90' text-anchor='middle' fill='%23ffff00'>✨</text>
    </svg>">
  
  <title>LED跑马灯 · 手持应援灯牌</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'HarmonyOS Sans', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
      touch-action: manipulation;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      width: 100vw;
      position: relative;
    }

    /* 控制面板 */
    .controls {
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      z-index: 100;
      flex-shrink: 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.15);
      transition: opacity 0.3s ease;
      max-height: 48vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .controls.hide {
      opacity: 0.12;
      pointer-events: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      min-height: 42px;
    }

    input, button, select {
      padding: 8px 10px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      outline: none;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      -webkit-appearance: none;
      appearance: none;
      transition: all 0.15s ease;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    button {
      cursor: pointer;
      background: rgba(255,255,255,0.18);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    button:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.3);
      transition: transform 0.1s;
    }

    input[type="text"] {
      flex: 2;
      min-width: 160px;
      font-size: 18px;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.35);
      padding: 0 14px;
      letter-spacing: 2px;
      color: #fff;
    }

    input[type="range"] {
      flex: 1;
      padding: 0;
      background: transparent;
      height: 28px;
      border: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      margin-top: -10px;
      box-shadow: 0 0 12px #00eaff;
      border: 2px solid #00eaff;
    }

    input[type="color"] {
      width: 40px;
      height: 40px;
      padding: 2px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: transparent;
    }

    /* 按钮样式 */
    .btn-scroll-on { background: #ff2d78; border-color: #ff6b9d; color: #fff; }
    .btn-scroll-off { background: #4a4a5a; color: #bbb; }
    .btn-marquee-on { background: #00e5ff; color: #000; border-color: #00e5ff; font-weight: bold; }
    .btn-marquee-off { background: #3a3a4a; color: #ccc; }
    .btn-full { background: #30c75c; color: #fff; border-color: #2ecc71; }
    .btn-share { background: #ff9500; color: #fff; font-weight: bold; }
    
    .style-btn {
      background: #2c2c3a;
      color: #ccc;
      border: 1px solid #555;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .style-btn.active {
      background: #00e5ff;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 15px #00e5ff;
    }
    
    .save-btn { background: #2e86de; color: #fff; }
    .del-btn { background: #e74c3c; color: #fff; }

    .emoji-btn {
      font-size: 22px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      line-height: 1;
      min-height: 38px;
    }

    .color-pre {
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .label { 
      font-size: 12px; 
      color: #aaa; 
      min-width: 50px; 
      font-weight: 500;
    }
    
    .val { 
      font-size: 12px; 
      color: #fff; 
      min-width: 35px; 
      text-align: center; 
    }

    /* LED 显示区 */
    #led-box {
      flex: 1;
      width: 100%;
      background: #000;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      touch-action: pan-y pinch-zoom;
    }

    .text-container {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-weight: 900;
      z-index: 2;
      padding: 8px 20px;
      text-shadow: 0 0 18px currentColor;
      letter-spacing: 3px;
      pointer-events: none;
      will-change: left;
      -webkit-font-smoothing: antialiased;
    }

    /* 跑马灯边框特效 */
    .marquee-base {
      position: absolute;
      top: -4px; 
      left: -4px; 
      right: -4px; 
      bottom: -4px;
      border: 4px solid transparent;
      border-radius: 28px;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 1;
      pointer-events: none;
    }

    .marquee-rainbow {
      background: linear-gradient(90deg, #ff2400, #ffd800, #00e1ff, #9d00ff, #ff2400) border-box;
      background-size: 500% 100%;
      animation: flow 2.2s linear infinite;
    }
    
    .marquee-gold {
      background: linear-gradient(90deg, #fff700, #ffaa00, #fff700) border-box;
      background-size: 300% 100%;
      animation: flow 1.8s linear infinite;
    }
    
    .marquee-neon {
      background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff) border-box;
      background-size: 300% 100%;
      animation: pingpong 2s ease-in-out infinite;
    }
    
    .marquee-red {
      background: linear-gradient(90deg, #ff0000, #ff5500, #ff0000) border-box;
      background-size: 200% 100%;
      animation: breath 2s ease-in-out infinite;
    }
    
    .marquee-fast {
      background: linear-gradient(90deg, #ffffff, #88ffff, #ffffff) border-box;
      background-size: 400% 100%;
      animation: flow 0.9s linear infinite;
    }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      100% { background-position: 500% 50%; }
    }
    
    @keyframes pingpong {
      0% { background-position: 0% 50%; }
      50% { background-position: 300% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes breath {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* 提示信息 */
    .share-tip {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff9500;
      color: #000;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: bold;
      z-index: 200;
      display: none;
      box-shadow: 0 4px 20px rgba(255,149,0,0.5);
      animation: bounce 0.6s ease;
    }
    
    .pwa-tip {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #30c75c;
      color: #000;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: bold;
      z-index: 200;
      display: none;
      box-shadow: 0 4px 20px rgba(48,199,92,0.5);
      animation: bounce 0.6s ease;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- 控制面板 -->
  <div class="controls" id="controlPanel">
    <!-- 文案管理与分享 -->
    <div class="row">
      <select id="textPreset" style="flex:1;">
        <option value="">📋 历史文案</option>
      </select>
      <button class="save-btn" id="saveBtn" title="保存文案">💾</button>
      <button class="del-btn" id="delBtn" title="删除文案">🗑️</button>
      <button class="btn-share" id="shareBtn" title="复制链接在Safari打开">🔗</button>
    </div>

    <!-- 字体选择 -->
    <div class="row">
      <select id="fontFamily" style="flex:1;">
        <option value="sans-serif">系统默认字体</option>
        <option value="'HarmonyOS Sans', 'PingFang SC', sans-serif">鸿蒙/苹方黑体</option>
        <option value="'Noto Sans SC', sans-serif">思源黑体</option>
        <option value="Georgia, 'Times New Roman', serif">衬线字体</option>
        <option value="'Courier New', monospace">等宽字体</option>
      </select>
    </div>

    <!-- 表情符号 -->
    <div class="row" id="emojiWrap">
      <button class="emoji-btn">❤️</button>
      <button class="emoji-btn">🧡</button>
      <button class="emoji-btn">💛</button>
      <button class="emoji-btn">💚</button>
      <button class="emoji-btn">💙</button>
      <button class="emoji-btn">💜</button>
      <button class="emoji-btn">🩷</button>
      <button class="emoji-btn">✨</button>
      <button class="emoji-btn">🌟</button>
      <button class="emoji-btn">🔥</button>
      <button class="emoji-btn">⚡</button>
      <button class="emoji-btn">🎤</button>
      <button class="emoji-btn">🎵</button>
      <button class="emoji-btn">🎉</button>
      <button class="emoji-btn">👏</button>
    </div>

    <!-- 文字输入 -->
    <div class="row">
      <input type="text" id="input-text" value="LOVE 2026" placeholder="输入要显示的文字..." autocomplete="off" autocorrect="off">
    </div>

    <!-- 颜色选择 -->
    <div class="row" id="colorWrap">
      <button class="color-pre" data-color="#ffff00" style="background:#ffff00;" title="黄色"></button>
      <button class="color-pre" data-color="#ff0000" style="background:#ff0000;" title="红色"></button>
      <button class="color-pre" data-color="#00ff00" style="background:#00ff00;" title="绿色"></button>
      <button class="color-pre" data-color="#00ffff" style="background:#00ffff;" title="青色"></button>
      <button class="color-pre" data-color="#ff00ff" style="background:#ff00ff;" title="品红"></button>
      <button class="color-pre" data-color="#ffffff" style="background:#ffffff;" title="白色"></button>
      <input type="color" id="color-text" value="#ffff00" title="文字颜色">
      <input type="color" id="color-bg" value="#000000" title="背景颜色">
    </div>

    <!-- 字号调节 -->
    <div class="row">
      <span class="label">🔤 字号</span>
      <input type="range" id="range-size" min="30" max="300" value="85" step="1">
      <span class="val" id="size-val">85px</span>
    </div>

    <!-- 速度调节 -->
    <div class="row">
      <span class="label">⚡ 速度</span>
      <input type="range" id="range-speed" min="1" max="30" value="10" step="1">
      <span class="val" id="speed-val">10</span>
    </div>

    <!-- 特效与开关 -->
    <div class="row" id="styleWrap">
      <button class="style-btn active" data-style="rainbow">🌈彩虹</button>
      <button class="style-btn" data-style="gold">✨金色</button>
      <button class="style-btn" data-style="neon">💜霓彩</button>
      <button class="style-btn" data-style="red">❤️炽红</button>
      <button class="style-btn" data-style="fast">⚡极速</button>
      <button id="btn-marquee" class="btn-marquee-off">💡边框</button>
      <button id="btn-scroll" class="btn-scroll-on">⏸️静止</button>
      <button class="btn-full" id="fullBtn">📱全屏</button>
    </div>
  </div>

  <!-- LED 显示屏 -->
  <div id="led-box"></div>
  
  <!-- 提示信息 -->
  <div class="share-tip" id="shareTip">✅ 链接已复制！在 Safari 中粘贴打开</div>
  <div class="pwa-tip" id="pwaTip">📲 点击分享 → 添加到主屏幕，像App一样使用</div>
</div>

<script>
  (function() {
    // ========== 状态管理 ==========
    let animationId = null;
    let isScrolling = true;           // 滚动状态
    let borderLightOn = false;       // 边框灯状态
    let currentStyle = 'rainbow';     // 当前边框样式
    let currentPosition = window.innerWidth; // 文字初始位置
    let currentFont = 'sans-serif';   // 当前字体
    
    // 从本地存储加载历史文案
    let textHistory = [];
    try {
      textHistory = JSON.parse(localStorage.getItem('led_text_history')) || [];
    } catch(e) {
      textHistory = [];
    }
    
    // ========== DOM 元素 ==========
    const controlPanel = document.getElementById('controlPanel');
    const ledBox = document.getElementById('led-box');
    const textPreset = document.getElementById('textPreset');
    const fontSelect = document.getElementById('fontFamily');
    const inputText = document.getElementById('input-text');
    const colorText = document.getElementById('color-text');
    const colorBg = document.getElementById('color-bg');
    const sizeSlider = document.getElementById('range-size');
    const speedSlider = document.getElementById('range-speed');
    const sizeVal = document.getElementById('size-val');
    const speedVal = document.getElementById('speed-val');
    const btnScroll = document.getElementById('btn-scroll');
    const btnMarquee = document.getElementById('btn-marquee');
    const shareBtn = document.getElementById('shareBtn');
    const shareTip = document.getElementById('shareTip');
    const pwaTip = document.getElementById('pwaTip');
    
    // ========== 工具函数 ==========
    function saveHistory() {
      try {
        localStorage.setItem('led_text_history', JSON.stringify(textHistory));
      } catch(e) {
        console.warn('存储空间不足，无法保存文案');
      }
    }

    function updatePresetSelect() {
      textPreset.innerHTML = '<option value="">📋 历史文案</option>';
      textHistory.forEach((item, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = item.length > 15 ? item.substring(0, 13) + '…' : item;
        textPreset.appendChild(opt);
      });
    }

    function stopAnimation() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    // ========== 核心渲染 ==========
    function renderLED() {
      stopAnimation();
      
      const text = inputText.value.trim() || 'LED';
      const color = colorText.value;
      const bg = colorBg.value;
      const fontSize = sizeSlider.value + 'px';
      const speed = parseInt(speedSlider.value, 10);
      
      // 设置背景色
      ledBox.style.backgroundColor = bg;
      ledBox.innerHTML = '';
      
      // 创建文字元素
      const textEl = document.createElement('div');
      textEl.className = 'text-container';
      textEl.textContent = text;
      textEl.style.color = color;
      textEl.style.fontSize = fontSize;
      textEl.style.fontFamily = currentFont;
      
      // 静止状态：居中显示
      if (!isScrolling) {
        textEl.style.left = '50%';
        textEl.style.transform = 'translate(-50%, -50%)';
        ledBox.appendChild(textEl);
        
        // 添加边框特效
        if (borderLightOn) {
          const borderFrame = document.createElement('div');
          borderFrame.className = `marquee-base marquee-${currentStyle}`;
          textEl.appendChild(borderFrame);
        }
        return;
      }
      
      // 滚动状态：从右侧开始
      textEl.style.left = currentPosition + 'px';
      textEl.style.transform = 'translateY(-50%)';
      ledBox.appendChild(textEl);
      
      // 添加边框特效
      if (borderLightOn) {
        const borderFrame = document.createElement('div');
        borderFrame.className = `marquee-base marquee-${currentStyle}`;
        textEl.appendChild(borderFrame);
      }
      
      // 动画循环
      function animate() {
        if (!isScrolling) {
          stopAnimation();
          return;
        }
        
        const currentLeft = parseFloat(textEl.style.left) || currentPosition;
        const newLeft = currentLeft - (speed / 8);
        
        // 文字完全移出屏幕左侧后，从右侧重新进入
        if (newLeft < -textEl.offsetWidth - 50) {
          textEl.style.left = window.innerWidth + 20 + 'px';
        } else {
          textEl.style.left = newLeft + 'px';
        }
        
        animationId = requestAnimationFrame(animate);
      }
      
      // 启动动画
      animationId = requestAnimationFrame(animate);
    }

    // ========== 交互功能 ==========
    function toggleScroll() {
      isScrolling = !isScrolling;
      if (isScrolling) {
        btnScroll.textContent = '⏸️静止';
        btnScroll.className = 'btn-scroll-on';
        currentPosition = window.innerWidth;
      } else {
        btnScroll.textContent = '▶️滚动';
        btnScroll.className = 'btn-scroll-off';
        stopAnimation();
      }
      renderLED();
    }

    function toggleBorderLight() {
      borderLightOn = !borderLightOn;
      if (borderLightOn) {
        btnMarquee.textContent = '💡边框开';
        btnMarquee.className = 'btn-marquee-on';
      } else {
        btnMarquee.textContent = '💡边框';
        btnMarquee.className = 'btn-marquee-off';
      }
      renderLED();
    }

    function setMarqueeStyle(style, btnElement) {
      currentStyle = style;
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      if (btnElement) btnElement.classList.add('active');
      if (borderLightOn) renderLED();
    }

    // 生成可分享的 Blob URL
    function generateShareableLink() {
      const fullHTML = document.documentElement.outerHTML;
      const blob = new Blob(['<!DOCTYPE html>\n' + fullHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      
      // 尝试在新窗口打开
      const newWindow = window.open(url, '_blank');
      
      // 同时复制到剪贴板
      const tempInput = document.createElement('textarea');
      tempInput.value = url;
      tempInput.style.position = 'fixed';
      tempInput.style.opacity = '0';
      document.body.appendChild(tempInput);
      tempInput.select();
      
      try {
        document.execCommand('copy');
        showTip(shareTip);
      } catch (err) {
        alert('请手动复制链接并在 Safari 中打开：\n' + url);
      }
      
      document.body.removeChild(tempInput);
      
      // 5分钟后释放内存
      setTimeout(() => URL.revokeObjectURL(url), 300000);
    }

    function showTip(element) {
      element.style.display = 'block';
      element.style.animation = 'none';
      element.offsetHeight; // 触发回流
      element.style.animation = 'bounce 0.6s ease';
      setTimeout(() => {
        element.style.display = 'none';
      }, 2500);
    }

    function saveCurrentText() {
      const text = inputText.value.trim();
      if (text && !textHistory.includes(text)) {
        textHistory.push(text);
        if (textHistory.length > 20) textHistory.shift(); // 最多保存20条
        saveHistory();
        updatePresetSelect();
        showTip(pwaTip);
      }
    }

    function deleteSelectedText() {
      if (textPreset.value !== '') {
        const index = parseInt(textPreset.value, 10);
        textHistory.splice(index, 1);
        saveHistory();
        updatePresetSelect();
      }
    }

    // ========== 事件绑定 ==========
    // 文案选择
    textPreset.addEventListener('change', function() {
      if (this.value !== '') {
        const idx = parseInt(this.value, 10);
        if (textHistory[idx]) {
          inputText.value = textHistory[idx];
          renderLED();
        }
      }
    });

    // 保存/删除文案
    document.getElementById('saveBtn').addEventListener('click', saveCurrentText);
    document.getElementById('delBtn').addEventListener('click', deleteSelectedText);
    
    // 分享链接
    shareBtn.addEventListener('click', generateShareableLink);

    // 字体切换
    fontSelect.addEventListener('change', function() {
      currentFont = this.value;
      renderLED();
    });

    // 表情插入
    document.querySelectorAll('#emojiWrap .emoji-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        inputText.value += this.textContent;
        inputText.focus();
        renderLED();
      });
    });

    // 预设颜色
    document.querySelectorAll('#colorWrap .color-pre').forEach(btn => {
      btn.addEventListener('click', function() {
        colorText.value = this.dataset.color;
        renderLED();
      });
    });

    // 边框样式切换
    document.querySelectorAll('#styleWrap .style-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        setMarqueeStyle(this.dataset.style, this);
      });
    });

    // 滚动/边框开关
    btnScroll.addEventListener('click', toggleScroll);
    btnMarquee.addEventListener('click', toggleBorderLight);

    // 全屏按钮（iOS兼容处理）
    document.getElementById('fullBtn').addEventListener('click', function() {
      const el = document.documentElement;
      
      // 尝试标准全屏API
      if (el.requestFullscreen) {
        el.requestFullscreen().catch(() => {
          handleIOSFullscreen();
        });
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      } else {
        handleIOSFullscreen();
      }
      
      function handleIOSFullscreen() {
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
          controlPanel.classList.add('hide');
          alert('📱 请将手机旋转至横屏，并将网页添加到主屏幕以获得最佳全屏体验');
          setTimeout(() => controlPanel.classList.remove('hide'), 4000);
        }
      }
    });

    // 实时输入更新
    inputText.addEventListener('input', renderLED);
    colorText.addEventListener('input', renderLED);
    colorBg.addEventListener('input', renderLED);
    
    sizeSlider.addEventListener('input', function() {
      sizeVal.textContent = this.value + 'px';
      renderLED();
    });
    
    speedSlider.addEventListener('input', function() {
      speedVal.textContent = this.value;
      renderLED();
    });

    // 点击LED区域切换控制面板
    ledBox.addEventListener('click', function(e) {
      // 防止误触边框按钮
      if (e.target === ledBox) {
        controlPanel.classList.toggle('hide');
      }
    });

    // 窗口大小变化时重置位置
    window.addEventListener('resize', function() {
      currentPosition = window.innerWidth;
      if (isScrolling) {
        renderLED();
      }
    });

    // 监听全屏状态变化
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    
    function handleFullscreenChange() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        controlPanel.classList.add('hide');
      } else {
        controlPanel.classList.remove('hide');
      }
    }

    // 键盘事件：按空格键切换滚动
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' && document.activeElement !== inputText) {
        e.preventDefault();
        toggleScroll();
      }
    });

    // ========== PWA 相关 ==========
    // 检测是否已添加到主屏幕
    function isRunningStandalone() {
      return window.navigator.standalone || 
             window.matchMedia('(display-mode: standalone)').matches;
    }
    
    // 首次使用时提示添加到主屏幕
    function showPWAInstallTip() {
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const isStandalone = isRunningStandalone();
      
      if (isIOS && !isStandalone && !localStorage.getItem('pwa_tip_shown')) {
        setTimeout(() => {
          pwaTip.textContent = '📲 点击分享按钮 → 添加到主屏幕';
          showTip(pwaTip);
          localStorage.setItem('pwa_tip_shown', 'true');
        }, 2000);
      }
    }

    // ========== 注册 Service Worker ==========
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        // 创建内联 Service Worker
        const swCode = `
          const CACHE_NAME = 'led-marquee-v2';
          const ASSETS = ['/'];
          
          self.addEventListener('install', (e) => {
            e.waitUntil(
              caches.open(CACHE_NAME).then(cache => {
                return cache.addAll(ASSETS);
              })
            );
          });
          
          self.addEventListener('fetch', (e) => {
            e.respondWith(
              caches.match(e.request).then(response => {
                return response || fetch(e.request);
              })
            );
          });
          
          self.addEventListener('activate', (e) => {
            e.waitUntil(
              caches.keys().then(keys => {
                return Promise.all(
                  keys.filter(key => key !== CACHE_NAME)
                      .map(key => caches.delete(key))
                );
              })
            );
          });
        `;
        
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(swUrl)
          .then(() => console.log('Service Worker 注册成功'))
          .catch(() => console.log('Service Worker 注册失败（离线功能不可用）'));
      });
    }

    // ========== 初始化 ==========
    function init() {
      updatePresetSelect();
      renderLED();
      showPWAInstallTip();
      
      // 如果从主屏幕启动，自动隐藏控制面板
      if (isRunningStandalone()) {
        setTimeout(() => {
          controlPanel.classList.add('hide');
        }, 1000);
      }
    }

    // 启动应用
    init();
    
    console.log('✨ LED跑马灯已就绪');
    console.log('💡 点击屏幕中间切换控制面板');
    console.log('📱 添加到主屏幕可获得最佳体验');
    console.log('🎨 支持彩虹/金色/霓彩/炽红/极速五种边框特效');
  })();
</script>
</body>
</html>
